<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triaged Reports Center | Bug Bounty Scenarios Academy</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- Boxicons -->
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <!-- Visual decoration -->
  <div class="bg-glow">
    <div class="glow-orb orb-1"></div>
  </div>
  <div class="scanlines"></div>

  <!-- Header -->
  <header class="app-header">
    <div class="logo">
      <i class="bx bx-target-lock logo-icon"></i>
      <span class="logo-text" onclick="window.location.href='../index.html'" style="cursor:pointer;">Bug Bounty Scenarios Academy</span>
      <span class="logo-subtext">Simulator V2</span>
    </div>
    
    <div class="header-stats" id="global-stats-drawer">
      <!-- Stats badges -->
    </div>
  </header>

  <main class="view-panel active">
    <!-- Sub-header -->
    <div class="simulator-controls" style="margin-bottom: 30px;">
      <button class="control-btn" onclick="window.location.href='../index.html'">
        <i class="bx bx-left-arrow-alt"></i> Back to Dashboard
      </button>
      <div class="simulator-title">Reports Submission Logs (HackerOne Staging)</div>
    </div>

    <!-- Reports list logs -->
    <section class="scenarios-grid" id="reports-logs-grid" style="grid-template-columns: 1fr;">
      <!-- Injected dynamically -->
    </section>
  </main>

  <script src="../assets/js/db.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      // Load stats
      const solved = JSON.parse(localStorage.getItem('bb_sim_solved')) || [];
      const xp = parseInt(localStorage.getItem('bb_sim_xp')) || 0;
      const bounty = parseInt(localStorage.getItem('bb_sim_bounty')) || 0;
      
      let rank = 'Recon Rookie';
      if (xp >= 15000) rank = 'Elite Bug Hunter';
      else if (xp >= 8000) rank = 'Master Hunter';
      else if (xp >= 3000) rank = 'Security Researcher';
      else if (xp >= 1000) rank = 'Triage Expert';
      else if (xp >= 300) rank = 'Bug Hunter';

      document.getElementById('global-stats-drawer').innerHTML = `
        <div class="stat-badge xp-badge"><i class="bx bxs-zap"></i> <span class="stat-label">XP:</span> <span class="stat-value">${xp}</span></div>
        <div class="stat-badge bounty-badge"><i class="bx bx-dollar-circle"></i> <span class="stat-label">Bounty:</span> <span class="stat-value">$${bounty.toLocaleString()}</span></div>
        <div class="stat-badge rank-badge"><i class="bx bxs-medal"></i> <span class="stat-label">Rank:</span> <span class="stat-value">${rank}</span></div>
      `;

      const grid = document.getElementById('reports-logs-grid');
      grid.innerHTML = '';

      if(solved.length === 0) {
        grid.innerHTML = `<div style="text-align: center; color: var(--text-muted); padding: 40px; background:var(--bg-card); border: 1px solid var(--border-color); border-radius:12px;">You haven't submitted any vulnerability reports yet. Solve a scenario to populate this register.</div>`;
        return;
      }

      solved.forEach(scId => {
        const sc = window.scenariosDatabase.find(x => x.id === scId);
        if(!sc) return;

        const row = document.createElement('div');
        row.className = 'cyber-card';
        row.style.background = 'var(--bg-card)';
        row.style.border = '1px solid var(--border-color)';
        row.style.padding = '20px';
        row.style.borderRadius = '8px';
        row.style.marginBottom = '15px';
        row.style.display = 'flex';
        row.style.justifyContent = 'space-between';
        row.style.alignItems = 'center';
        
        row.innerHTML = `
          <div>
            <h4 style="margin:0 0 5px 0; color:var(--text-main); font-family:var(--font-title);">${sc.title}</h4>
            <span style="font-size:0.75rem; color:var(--text-muted);">ID: ${sc.id.toUpperCase()} | Company: ${sc.company} | Focus: ${sc.category}</span>
          </div>
          <div style="display:flex; gap:10px; align-items:center;">
            <span class="difficulty-badge real" style="text-transform:uppercase;">Triaged</span>
            <span class="bounty-amount" style="font-size:1rem; color:var(--accent-green); font-weight:700;">+${sc.reward}</span>
            <button class="hunt-btn" onclick="window.location.href='scenario.html?id=${sc.id}'" style="padding:6px 12px; font-size:0.8rem;">Review</button>
          </div>
        `;
        grid.appendChild(row);
      });
    });
  </script>
</body>
</html>
