<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CCNA Exam Simulator - محاكي الامتحانات</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <link rel="stylesheet" href="features.css">
    <style>
        body { overflow: auto; padding: 20px; }
        .exam-container { max-width: 800px; margin: 20px auto; background: var(--panel-bg); padding: 30px; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .exam-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        .exam-timer { font-size: 1.5rem; font-family: 'Fira Code', monospace; color: var(--danger); font-weight: bold; }
        .question-block { display: none; }
        .question-block.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .question-text { font-size: 1.3rem; color: var(--accent); margin-bottom: 20px; line-height: 1.6; }
        .option-label { display: block; background: var(--bg-color); padding: 15px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: all 0.2s; font-size: 1.1rem; }
        .option-label:hover { border-color: var(--accent); background: rgba(88, 166, 255, 0.05); }
        .option-label input { margin-left: 10px; transform: scale(1.2); }
        .exam-controls { display: flex; justify-content: space-between; margin-top: 30px; }
        .btn { padding: 12px 25px; border: none; border-radius: 6px; font-family: 'Tajawal', sans-serif; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .btn-next { background: var(--accent); color: #fff; }
        .btn-next:hover { background: var(--accent-hover); }
        .btn-finish { background: var(--success); color: #fff; }
        .btn-start { background: var(--accent); color: #fff; width: 100%; padding: 15px; font-size: 1.3rem; margin-top: 20px; }
        .result-screen { text-align: center; display: none; }
        .result-score { font-size: 4rem; color: var(--success); margin: 20px 0; font-family: 'Fira Code', monospace; }
        .review-list { text-align: right; margin-top: 30px; }
        .review-item { background: var(--bg-color); padding: 15px; margin-bottom: 10px; border-radius: 6px; border-right: 5px solid var(--danger); }
        .review-item.correct { border-right-color: var(--success); }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <h1>Cisco CCNA Academy</h1>
            <span class="subtitle">محاكي الامتحان الشامل (Exam Mode)</span>
        </div>
        <div class="nav-buttons">
            <a href="academy.html" class="top-btn">🔙 العودة للدروس</a>
        </div>
    </header>

    <div class="exam-container">
        <!-- Start Screen -->
        <div id="startScreen">
            <h2 style="text-align: center; color: var(--accent); margin-bottom: 20px;">جاري تحميل الأسئلة... ⏳</h2>
        </div>

        <!-- Exam Screen -->
        <div id="examScreen" style="display: none;">
            <div class="exam-header">
                <div>السؤال: <span id="qCurrent">1</span> / <span id="qTotal">10</span></div>
                <div>
                    <button class="btn" style="background: rgba(255,255,255,0.1); color: #fff; padding: 5px 15px; font-size: 0.9rem;" onclick="markReview()">🚩 تظليل للمراجعة</button>
                </div>
                <div class="exam-timer" id="timerDisplay">10:00</div>
            </div>
            
            <div id="questionContainer"></div>

            <div class="exam-controls">
                <button class="btn" id="prevBtn" style="background: var(--bg-color); color: #c9d1d9; border: 1px solid var(--border);" onclick="prevQuestion()">❮ السابق</button>
                <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()">التالي ❯</button>
                <button class="btn btn-finish" id="finishBtn" style="display: none;" onclick="finishExam()">إنهاء الامتحان ✔</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="resultScreen" class="result-screen">
            <h2 id="resultMsg">انتهى الامتحان!</h2>
            <div class="result-score" id="scoreDisplay">0%</div>
            <p id="scoreComment" style="font-size: 1.2rem; color: #c9d1d9;"></p>
            <button class="btn btn-start" style="width: auto; padding: 10px 30px; margin-top: 20px;" onclick="location.reload()">إعادة الامتحان</button>
            
            <h3 style="margin-top: 40px; text-align: right; color: var(--accent);">مراجعة الأخطاء:</h3>
            <div id="reviewContainer" class="review-list"></div>
        </div>
    </div>

    <!-- Data loading -->
    <script src="data_loader.js"></script>
    <script src="quizzes.js?v=18" charset="utf-8"></script>
    <script src="exam.js"></script>
</body>
</html>
