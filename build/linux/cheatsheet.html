<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Linux Cheatsheet - ملخص أوامر إدارة وحماية الأنظمة</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <link rel="stylesheet" href="features.css">
    <style>
        body { overflow-y: auto !important; height: auto !important; display: block !important; padding: 0; }
        
        .cheatsheet-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .cheatsheet-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .cheatsheet-header h2 {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 15px;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .cheatsheet-header p {
            color: #94a3b8;
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Search & Filter Bar */
        .filter-section {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: var(--glass-blur);
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .search-wrapper {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 15px 45px 15px 20px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1.2rem;
        }

        .category-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: #c9d1d9;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .tab-btn.active {
            background: var(--accent);
            color: #0d1117;
            border-color: var(--accent);
            font-weight: bold;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Grid Layout */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .cmd-card {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .cmd-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 25px rgba(46, 160, 67, 0.15);
        }

        .cmd-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .cmd-badge {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.2s;
            padding: 5px;
        }

        .copy-btn:hover {
            color: var(--accent);
        }

        .cmd-code-wrapper {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            color: #58a6ff;
            direction: ltr;
            text-align: left;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cmd-desc {
            color: #e2e8f0;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .cmd-example {
            color: #8b949e;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 10px;
            margin-top: auto;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ea043;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, bottom 0.3s;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <h1>Linux Academy</h1>
            <span class="subtitle">ملخص الأوامر التفاعلي (RHEL 9 Cheatsheet)</span>
        </div>
        <div class="nav-buttons">
            <a href="academy.html" class="top-btn" style="margin-left: 5px;">📚 النظري</a>
            <a href="syllabus.html" class="top-btn" style="margin-left: 5px;">📖 الخطة</a>
            <a href="index.html" class="top-btn" style="margin-left: 5px;">💻 المحاكي</a>
            <a href="exam.html" class="top-btn" style="margin-left: 5px;">⏳ امتحن نفسك</a>
            <a href="interview.html" class="top-btn" style="margin-left: 5px;">💼 المقابلات</a>
            <a href="resources.html" class="top-btn">📦 الملحقات</a>
        </div>
    </header>

    <div class="cheatsheet-container">
        <div class="cheatsheet-header">
            <h2>دليل الأوامر الشامل والتفاعلي لإدارة وحماية أنظمة RHEL 9</h2>
            <p>ابحث عن أي أمر في نظام لينكس، أو قم بفلترة الأوامر حسب الأقسام والتصنيفات التشغيلية والأمنية.</p>
        </div>

        <div class="filter-section">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن أمر أو وظيفة محددة (مثال: chmod, LVM, IP)..." oninput="filterCommands()">
            </div>
            <div class="category-tabs" id="categoryTabs">
                <button class="tab-btn active" onclick="filterCategory('all')">كل الأوامر</button>
                <button class="tab-btn" onclick="filterCategory('files')">الملفات والمجلدات</button>
                <button class="tab-btn" onclick="filterCategory('users')">المستخدمين والصلاحيات</button>
                <button class="tab-btn" onclick="filterCategory('systemd')">إدارة الخدمات (Systemd)</button>
                <button class="tab-btn" onclick="filterCategory('dnf')">إدارة الحزم (DNF)</button>
                <button class="tab-btn" onclick="filterCategory('storage')">إدارة التخزين (LVM/Stratis)</button>
                <button class="tab-btn" onclick="filterCategory('security')">الحماية والشبكات (SELinux/Firewalld)</button>
                <button class="tab-btn" onclick="filterCategory('forensics')">التحليل الجنائي والتحري</button>
            </div>
        </div>

        <div class="cards-grid" id="cardsGrid">
            <!-- Injected by JS -->
        </div>
    </div>

    <div class="toast" id="toast">تم نسخ الأمر بنجاح! 📋</div>

    <script>
        const commands = [
            // Files & folders
            {
                cmd: "pwd",
                desc: "عرض مسار مجلد العمل الحالي (Working Directory).",
                example: "مثال: لمعرفة مكانك الحالي في شجرة الملفات.",
                category: "files",
                badge: "مسار العمل"
            },
            {
                cmd: "ls -la",
                desc: "عرض تفاصيل جميع الملفات والمجلدات بما فيها الملفات المخفية وصلاحياتها.",
                example: "مثال: رؤية الملفات التي تبدأ بنقطة مثل .bashrc.",
                category: "files",
                badge: "عرض الملفات"
            },
            {
                cmd: "cd ~",
                desc: "الانتقال مباشرة للمجلد الرئيسي للمستخدم الحالي (Home Directory).",
                example: "مثال: الذهاب إلى /root أو /home/user بسرعة.",
                category: "files",
                badge: "التنقل"
            },
            {
                cmd: "mkdir -p project/{src,bin}",
                desc: "إنشاء هيكلية مجلدات متعددة ومتفرعة في نفس الوقت بأمر واحد.",
                example: "مثال: يختصر إنشاء مجلدات فرعية متداخلة.",
                category: "files",
                badge: "إنشاء مجلدات"
            },
            {
                cmd: "cp -r folder1/ folder2/",
                desc: "نسخ مجلد بكافة محتوياته وملفاته الفرعية بشكل متكرر (Recursive).",
                example: "مثال: عمل نسخة احتياطية من مجلد كامل.",
                category: "files",
                badge: "النسخ"
            },
            // Users & Perms
            {
                cmd: "useradd -m -s /bin/bash username",
                desc: "إنشاء مستخدم جديد مع مجلد منزلي وتعيين شل Bash كواجهة افتراضية.",
                example: "مثال: إضافة مستخدم جديد للنظام بشكل سليم.",
                category: "users",
                badge: "إدارة الحسابات"
            },
            {
                cmd: "passwd username",
                desc: "تغيير كلمة المرور الخاصة بالمستخدم المحدد (يتطلب صلاحيات root).",
                example: "مثال: تعيين أو تحديث كلمة مرور حساب مستخدم.",
                category: "users",
                badge: "الأمان"
            },
            {
                cmd: "chmod 755 file.sh",
                desc: "تعيين صلاحيات كاملة للمالك (7) وصلاحية قراءة وتشغيل للمجموعة والآخرين (5).",
                example: "مثال: جعل السكريبت قابلاً للتشغيل.",
                category: "users",
                badge: "صلاحيات"
            },
            {
                cmd: "chown user:group file.txt",
                desc: "تغيير ملكية الملف للمستخدم المحدد والمجموعة المحددة دفعة واحدة.",
                example: "مثال: نقل ملكية مستند إلى قسم آخر.",
                category: "users",
                badge: "الملكية"
            },
            {
                cmd: "chmod g+s /shared/dir",
                desc: "تفعيل بت الـ SetGID على مجلد؛ ليرث أي ملف ينشأ بداخله مجموعة المجلد الأصلي تلقائياً.",
                example: "مثال: مثالي لتهيئة بيئة عمل تشاركية بين فريق المطورين.",
                category: "users",
                badge: "صلاحيات خاصة"
            },
            {
                cmd: "setfacl -m u:username:rw file.txt",
                desc: "إعطاء صلاحية مخصصة (قراءة وكتابة) لمستخدم محدد خارج صلاحيات الملف الأساسية بـ ACL.",
                example: "مثال: منح صلاحية لـ Auditing User دون تغيير المالك.",
                category: "users",
                badge: "ACLs"
            },
            // Systemd
            {
                cmd: "systemctl start sshd",
                desc: "تشغيل خدمة الـ SSH اللحظية الفعالة على السيرفر.",
                example: "مثال: تشغيل خادم الاتصال الآمن يدوياً.",
                category: "systemd",
                badge: "تشغيل خدمات"
            },
            {
                cmd: "systemctl enable --now nginx",
                desc: "تشغيل خدمة خادم ويب وتفعيلها للعمل تلقائياً مع إقلاع النظام المستقبلي بأمر واحد.",
                example: "مثال: تضمن تشغيل خوادم الويب تلقائياً عند حدوث Restart للسيرفر.",
                category: "systemd",
                badge: "إقلاع الخدمة"
            },
            {
                cmd: "systemctl status firewalld",
                desc: "عرض الحالة الفورية لجدار الحماية، وهل هو نشط وسجل آخر التغييرات.",
                example: "مثال: فحص سلامة تشغيل السيرفرات.",
                category: "systemd",
                badge: "فحص الحالة"
            },
            {
                cmd: "journalctl -u sshd -f",
                desc: "متابعة سجلات وأحداث خدمة الـ SSH بشكل حي ومستمر لحظة وقوعها (Follow).",
                example: "مثال: مراقبة محاولات الهجوم على الـ SSH حال حدوثها.",
                category: "systemd",
                badge: "تحليل السجلات"
            },
            // DNF
            {
                cmd: "dnf install httpd -y",
                desc: "تثبيت خادم ويب Apache تلقائياً مع حل كافة التبعيات دون الحاجة لتأكيد المستخدم.",
                example: "مثال: تثبيت البرمجيات من المستودعات الرسمية.",
                category: "dnf",
                badge: "تثبيت الحزم"
            },
            {
                cmd: "dnf repoList",
                desc: "عرض جميع مستودعات البرمجيات المفعلة والنشطة في النظام حالياً.",
                example: "مثال: التحقق من مصادر تثبيت البرامج.",
                category: "dnf",
                badge: "المستودعات"
            },
            // Storage
            {
                cmd: "pvCreate /dev/sdb1",
                desc: "تهيئة القسم المادي (sdb1) ليصبح قرصاً فيزيائياً مهيأً للاستخدام في LVM.",
                example: "مثال: أول خطوة في بناء مساحة تخزين مرنة.",
                category: "storage",
                badge: "LVM"
            },
            {
                cmd: "vgextend vg_data /dev/sdb1",
                desc: "توسيع مجموعة الحجوم (vg_data) بإضافة القرص المادي الجديد المجهز إليها.",
                example: "مثال: زيادة المساحة المتاحة للتقسيم الإداري.",
                category: "storage",
                badge: "LVM"
            },
            {
                cmd: "lvextend -L +10G /dev/vg_data/lv_storage",
                desc: "زيادة حجم القسم المنطقي (lv_storage) بمقدار 10 جيجابايت إضافية.",
                example: "مثال: توفير مساحة تخزينية لقاعدة البيانات الآخذة بالنمو.",
                category: "storage",
                badge: "LVM"
            },
            {
                cmd: "xfs_growfs /mnt/storage",
                desc: "توسيع نظام ملفات XFS ليغطي كامل المساحة الجديدة التي تمت إضافتها للـ LV.",
                example: "مثال: تطبيق التوسع فعلياً دون فقدان البيانات أو إيقاف تشغيل الخادم.",
                category: "storage",
                badge: "أنظمة الملفات"
            },
            {
                cmd: "stratis pool Create mypool /dev/sdb",
                desc: "إنشاء تجمع أقراص Stratis حديث يدعم التخصيص الرقيق (Thin Provisioning) تلقائياً.",
                example: "مثال: بديل عصري يدمج LVM و XFS بطبقة واحدة ذكية.",
                category: "storage",
                badge: "Stratis"
            },
            // Security
            {
                cmd: "firewall-cmd --add-port=80/tcp --permanent",
                desc: "فتح منفذ الويب 80 بشكل دائم في جدار الحماية (يتطلب reload للتفعيل).",
                example: "مثال: السماح للزوار بالوصول لخادم الويب الخاص بك.",
                category: "security",
                badge: "جدار الحماية"
            },
            {
                cmd: "firewall-cmd --reload",
                desc: "إعادة تحميل جدار الحماية لتطبيق وتفعيل كافة القواعد الدائمة المضافة حديثاً.",
                example: "مثال: تفعيل القواعد دون قطع الاتصالات الحالية.",
                category: "security",
                badge: "جدار الحماية"
            },
            {
                cmd: "getenforce",
                desc: "عرض وضع التشغيل الحالي لنظام الحماية الإلزامي SELinux.",
                example: "مثال: يظهر Enforcing (الحظر الفعال) أو Permissive (المراقبة).",
                category: "security",
                badge: "SELinux"
            },
            {
                cmd: "restorecon -Rv /var/www/html",
                desc: "إعادة تعيين وتطبيق السياقات الأمنية الصحيحة لـ SELinux بشكل متكرر على مجلد الويب.",
                example: "مثال: يحل مشكلة الخطأ 403 Forbidden الذي يظهر لزوار موقعك بسبب SELinux.",
                category: "security",
                badge: "SELinux"
            },
            {
                cmd: "setsebool -P httpd_enable_homedirs on",
                desc: "تفعيل قاعدة SELinux المنطقية (Boolean) للسماح لخادم الويب بالوصول لمجلدات المستخدمين الخاصة.",
                example: "مثال: إعطاء الصلاحيات بطريقة آمنة ومقننة دون تعطيل الحماية.",
                category: "security",
                badge: "SELinux Booleans"
            },
            // Forensics
            {
                cmd: "find / -perm -4000 -type f 2>/dev/null",
                desc: "البحث في كامل السيرفر عن الملفات التي تمتلك صلاحية SUID (لتشغيلها بصلاحية مالك الملف/Root).",
                example: "مثال: أداة أساسية لاكتشاف ثغرات تصعيد الصلاحيات (Privilege Escalation).",
                category: "forensics",
                badge: "اختبار الاختراق"
            },
            {
                cmd: "icat -o 2048 image.dd 15",
                desc: "قراءة وعرض محتوى الملف المحذوف رقم 15 مباشرة من صورة القرص الجنائية dd.",
                example: "مثال: استرجاع الأدلة الجنائية والملفات التالفة أو المحذوفة.",
                category: "forensics",
                badge: "التحليل الجنائي"
            },
            {
                cmd: "grep -i 'failed' /var/log/secure",
                desc: "البحث في سجل الأمان عن جميع محاولات الدخول الفاشلة لاكتشاف هجمات كسر كلمة المرور.",
                example: "مثال: رصد هجمات Brute Force للـ SSH.",
                category: "forensics",
                badge: "تتبع السجلات"
            }
        ];

        let activeCategory = 'all';

        function renderCards(filterData) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            
            if(filterData.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #8b949e; padding: 40px; font-size: 1.2rem;">لم يتم العثور على أوامر تطابق بحثك. 🔍</div>`;
                return;
            }

            filterData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'cmd-card';
                card.innerHTML = `
                    <div>
                        <div class="cmd-header">
                            <span class="cmd-badge">${item.badge}</span>
                            <button class="copy-btn" onclick="copyToClipboard('${item.cmd}')" title="نسخ الأمر">📋</button>
                        </div>
                        <div class="cmd-code-wrapper">
                            <span>${item.cmd}</span>
                        </div>
                        <div class="cmd-desc">${item.desc}</div>
                    </div>
                    <div class="cmd-example">${item.example}</div>
                `;
                grid.appendChild(card);
            });
        }

        window.copyToClipboard = function(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            });
        }

        window.filterCategory = function(cat) {
            activeCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.getAttribute('onclick').includes(cat)) {
                    btn.classList.add('active');
                }
            });
            filterCommands();
        }

        window.filterCommands = function() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = commands.filter(item => {
                const matchesSearch = item.cmd.toLowerCase().includes(query) || 
                                      item.desc.toLowerCase().includes(query) || 
                                      item.badge.toLowerCase().includes(query);
                
                const matchesCategory = activeCategory === 'all' || item.category === activeCategory;
                
                return matchesSearch && matchesCategory;
            });
            renderCards(filtered);
        }

        // Initial Load
        renderCards(commands);
    </script>
    <script src="features.js?v=20"></script>
</body>
</html>
