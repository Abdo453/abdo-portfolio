<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Linux Flashcards Pro — بطاقات الاستذكار الاحترافية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <link rel="stylesheet" href="features.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Outfit:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            overflow: auto !important;
            height: auto !important;
            display: block !important;
            padding: 0;
            background: radial-gradient(circle at top center, #0b1a30 0%, #030816 100%);
            font-family: 'Tajawal', sans-serif;
        }
        
        .main-container {
            display: block !important;
            overflow: visible !important;
            max-width: 1300px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Stats & Header Panel */
        .dashboard-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .stats-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 25px;
            border-radius: 10px;
            text-align: center;
            min-width: 120px;
        }

        .stat-card .num {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            display: block;
        }

        .stat-card .label {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        /* Progress Bar */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .progress-bar-outer {
            width: 200px;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #10b981);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-percentage {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--success);
        }

        /* Filter Controls */
        .controls-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .filter-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            flex: 1;
        }

        .filter-group select {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .filter-group select:focus {
            border-color: var(--accent);
        }

        .search-box {
            position: relative;
            flex: 2;
            min-width: 280px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 45px 12px 20px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .search-box::after {
            content: "🔍";
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            opacity: 0.6;
        }

        .view-toggle {
            display: flex;
            gap: 10px;
        }

        .view-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #c9d1d9;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.3s;
        }

        .view-btn.active {
            background: var(--accent);
            color: #0d1117;
            border-color: var(--accent);
        }

        /* Card Grid View */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .flashcard-wrapper {
            perspective: 1000px;
            height: 480px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-side {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .card-front-side {
            background: linear-gradient(135deg, #0b1528 0%, #070d19 100%);
        }

        .card-back-side {
            background: linear-gradient(135deg, #090e1a 0%, #050810 100%);
            transform: rotateY(180deg);
            overflow-y: auto;
        }

        /* Badges & Tags styling */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card-cat {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 700;
        }

        .header-badges {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .badge-difficulty {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid transparent;
        }

        .diff-Beginner { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: rgba(16, 185, 129, 0.2); }
        .diff-Intermediate { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-color: rgba(59, 130, 246, 0.2); }
        .diff-Advanced { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border-color: rgba(245, 158, 11, 0.2); }
        .diff-Expert { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.2); }
        .diff-OSCP { background: rgba(139, 92, 246, 0.1); color: #a78bfa; border-color: rgba(139, 92, 246, 0.2); }
        .diff-RedTeam { background: rgba(236, 72, 153, 0.1); color: #f472b6; border-color: rgba(236, 72, 153, 0.2); }

        .badge-usedin {
            font-size: 0.65rem;
            background: rgba(234, 179, 8, 0.1);
            border: 1px solid rgba(234, 179, 8, 0.2);
            color: #eab308;
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 700;
        }

        .badge-state {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 700;
        }

        .badge-mastered { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .badge-review { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }

        /* Question & Answer Content */
        .card-question {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #f0f6fc;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: right;
            font-weight: 700;
            margin: 15px 0;
        }

        .card-answer-section {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 12px;
            margin-bottom: 12px;
        }

        .card-answer-label {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 6px;
            display: block;
        }

        .card-answer {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e6edf3;
        }

        .card-answer code, .detail-body code {
            font-family: 'Fira Code', monospace;
            background: rgba(0,0,0,0.3);
            color: #58a6ff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
            word-break: break-all;
            direction: ltr;
            display: inline-block;
        }

        /* Tags Footer */
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .badge-tag {
            font-size: 0.65rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: #8b949e;
            padding: 1px 6px;
            border-radius: 4px;
        }

        .card-footer-hint {
            text-align: center;
            font-size: 0.75rem;
            color: #8b949e;
            margin-top: auto;
            animation: pulse-light 2s infinite;
        }

        /* Interactive Collapsible Details */
        .card-details-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        details.card-detail {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s;
        }

        details.card-detail[open] {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(88, 166, 255, 0.3);
        }

        details.card-detail summary {
            padding: 6px 12px;
            font-size: 0.78rem;
            font-weight: 700;
            color: #58a6ff;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        details.card-detail summary::-webkit-details-marker {
            display: none;
        }

        details.card-detail summary::after {
            content: "▾";
            font-size: 0.75rem;
            transition: transform 0.2s;
        }

        details.card-detail[open] summary::after {
            content: "▴";
        }

        details.card-detail .detail-body {
            padding: 8px 12px;
            font-size: 0.78rem;
            color: #c9d1d9;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            line-height: 1.5;
            background: rgba(0, 0, 0, 0.1);
        }

        /* Card Actions */
        .card-actions {
            display: flex;
            gap: 8px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 12px;
            margin-top: auto;
        }

        .card-action-btn {
            flex: 1;
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn-need-review {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .btn-need-review:hover {
            background: rgba(245, 158, 11, 0.2);
        }

        .btn-mastered {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .btn-mastered:hover {
            background: rgba(16, 185, 129, 0.2);
        }

        .btn-flip-back {
            background: rgba(255, 255, 255, 0.05);
            color: #8b949e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .btn-flip-back:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        /* Focus View Layout */
        .focus-view {
            display: none;
            max-width: 750px;
            margin: 0 auto;
        }

        .focus-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            background: var(--panel-bg);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .focus-card-wrapper {
            height: 520px;
        }

        .focus-card-wrapper .card-question {
            font-size: 1.25rem;
        }

        @keyframes pulse-light {
            0% { opacity: 0.4; }
            50% { opacity: 0.8; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <h1>Linux Academy</h1>
            <span class="subtitle">Linux Flashcards Pro — بطاقات الاستذكار الاحترافية</span>
        </div>
        <div class="nav-buttons">
            <a href="index.html" class="top-btn">🏠 الرئيسية</a>
            <a href="academy.html" class="top-btn">📚 الدروس</a>
            <a href="encyclopedia.html" class="top-btn">📖 الموسوعة</a>
            <a href="cheatsheet.html" class="top-btn">📝 ورقة الغش</a>
            <a href="exam.html" class="top-btn">⚔️ المحاكي</a>
            <a href="interview.html" class="top-btn">💬 المقابلات</a>
        </div>
    </header>

    <div class="main-container">
        <!-- Dashboard Panel -->
        <div class="dashboard-panel">
            <div class="stats-group">
                <div class="stat-card">
                    <span class="num" id="statTotal">100</span>
                    <span class="label">إجمالي البطاقات</span>
                </div>
                <div class="stat-card">
                    <span class="num" id="statMastered" style="color: var(--success);">0</span>
                    <span class="label">تم حفظها</span>
                </div>
                <div class="stat-card">
                    <span class="num" id="statReview" style="color: var(--warning);">0</span>
                    <span class="label">تحتاج مراجعة</span>
                </div>
            </div>
            
            <div class="progress-container">
                <span class="label">نسبة الإتقان:</span>
                <div class="progress-bar-outer">
                    <div class="progress-bar-inner" id="statProgress"></div>
                </div>
                <span class="progress-percentage" id="statPercent">0%</span>
            </div>
        </div>

        <!-- Controls Panel -->
        <div class="controls-panel">
            <div class="filter-row">
                <div class="filter-group">
                    <select id="categoryFilter" style="min-width: 200px;">
                        <option value="all">📂 كل الفصول والأقسام</option>
                        <option value="1️⃣ التفاعل مع النظام وCLI">1️⃣ التفاعل مع النظام وCLI</option>
                        <option value="2️⃣ معالجة النصوص وBash Scripting">2️⃣ معالجة النصوص وBash Scripting</option>
                        <option value="3️⃣ الهوية والصلاحيات (DAC)">3️⃣ الهوية والصلاحيات (DAC)</option>
                        <option value="4️⃣ العمليات والخدمات">4️⃣ العمليات والخدمات</option>
                        <option value="5️⃣ البرمجيات والمستودعات">5️⃣ البرمجيات والمستودعات</option>
                        <option value="6️⃣ الشبكات">6️⃣ الشبكات</option>
                        <option value="7️⃣ جدار الحماية والوصول عن بعد">7️⃣ جدار الحماية والوصول عن بعد</option>
                        <option value="8️⃣ التخزين">8️⃣ التخزين</option>
                        <option value="9️⃣ الأرشفة والجدولة">9️⃣ الأرشفة والجدولة</option>
                        <option value="🔟 SELinux">🔟 SELinux</option>
                        <option value="1️⃣1️⃣ الإقلاع والإصلاح">1️⃣1️⃣ الإقلاع والإصلاح</option>
                        <option value="1️⃣2️⃣ الأتمتة والحاويات">1️⃣2️⃣ الأتمتة والحاويات</option>
                        <option value="🏆 أسئلة سيناريو (Scenario-Based)">🏆 أسئلة سيناريو (Scenario-Based)</option>
                    </select>

                    <select id="difficultyFilter">
                        <option value="all">⭐ كل الصعوبات</option>
                        <option value="Beginner">🟢 Beginner (مبتدئ)</option>
                        <option value="Intermediate">🔵 Intermediate (متوسط)</option>
                        <option value="Advanced">🔴 Advanced (متقدم)</option>
                        <option value="Expert">⚫ Expert (خبير)</option>
                        <option value="OSCP">🟣 OSCP (هجومي)</option>
                        <option value="Red Team">🟠 Red Team (فريق أحمر)</option>
                    </select>

                    <select id="tagFilter">
                        <option value="all">🏷️ كل التصنيفات والوسوم</option>
                        <option value="Filesystem">Filesystem (نظام الملفات)</option>
                        <option value="Bash">Bash (برمجة شل)</option>
                        <option value="Networking">Networking (الشبكات)</option>
                        <option value="Systemd">Systemd (الخدمات)</option>
                        <option value="Storage">Storage (التخزين)</option>
                        <option value="SELinux">SELinux (أمان الحماية)</option>
                        <option value="Containers">Containers (الحاويات)</option>
                        <option value="Privilege Escalation">Privilege Escalation (ترقية الصلاحيات)</option>
                        <option value="GTFOBins">GTFOBins (هروب الأدوات)</option>
                        <option value="Defensive">Defensive (الدفاع الفني)</option>
                        <option value="Capabilities">Capabilities (قدرات الملف)</option>
                        <option value="Bash Internals">Bash Internals (أكواد شل الداخلية)</option>
                        <option value="SSH">SSH (الاتصال الآمن)</option>
                        <option value="Logs">Logs (السجلات)</option>
                    </select>

                    <select id="stateFilter">
                        <option value="all">👁️ عرض كل البطاقات</option>
                        <option value="unstarted">🆕 لم تبدأ بعد</option>
                        <option value="review">🔄 قيد المراجعة</option>
                        <option value="mastered">✅ المحفوظة فقط</option>
                    </select>
                </div>

                <div class="view-toggle">
                    <button class="view-btn active" id="btnGridView" onclick="switchView('grid')">📱 عرض الشبكة</button>
                    <button class="view-btn" id="btnFocusView" onclick="switchView('focus')">🎯 وضع التركيز</button>
                </div>
            </div>

            <div class="filter-row">
                <div class="search-box">
                    <input type="text" id="cardSearch" placeholder="ابحث عن أمر، سيناريو، تصنيف، أو وسم...">
                </div>
                <button class="btn" style="background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: var(--danger); font-weight: 700; height: 100%;" onclick="resetProgress()">🔄 تصفير التقدم الدراسي</button>
            </div>
        </div>

        <!-- Grid View -->
        <div class="cards-grid" id="cardsGrid">
            <!-- Cards injected here -->
        </div>

        <!-- Focus View -->
        <div class="focus-view" id="focusView">
            <div class="flashcard-wrapper focus-card-wrapper" onclick="toggleFocusCard()">
                <div class="card-inner" id="focusCardInner">
                    <!-- Front -->
                    <div class="card-side card-front-side">
                        <div class="card-header">
                            <span class="card-cat" id="focusCardCat"></span>
                            <div class="header-badges" id="focusCardBadgesFront"></div>
                        </div>
                        <div class="card-question" id="focusCardQ"></div>
                        <div class="card-tags" id="focusCardTagsFront"></div>
                        <div class="card-footer-hint">👆 اضغط لمعاينة الإجابة والتفاصيل</div>
                    </div>
                    <!-- Back -->
                    <div class="card-side card-back-side" id="focusCardBack" onclick="event.stopPropagation()">
                        <div class="card-header">
                            <span class="card-cat" id="focusCardCatBack"></span>
                            <button class="btn-flip-back" onclick="toggleFocusCard()">↩️ قلب البطاقة</button>
                        </div>
                        
                        <div class="card-answer-section">
                            <span class="card-answer-label">🔑 الإجابة والأمر الأساسي:</span>
                            <div class="card-answer" id="focusCardA"></div>
                        </div>

                        <div class="card-details-container" id="focusCardDetails">
                            <!-- Injected details -->
                        </div>

                        <div class="card-actions" id="focusCardActions">
                            <!-- Injected actions -->
                        </div>
                    </div>
                </div>
            </div>

            <div class="focus-controls">
                <button class="view-btn" id="btnFocusPrev" onclick="navigateFocus(-1)">❮ السابق</button>
                <span id="focusProgressText" style="font-weight: 700; color: #8b949e;">0 / 0</span>
                <button class="view-btn" id="btnFocusNext" onclick="navigateFocus(1)">التالي ❯</button>
            </div>
        </div>
    </div>

    <!-- Script tags at the bottom -->
    <script>
        // Premium Flashcards Database (100 cards)
        const flashcardsData = [
            {
                id: 1,
                cat: "1️⃣ التفاعل مع النظام وCLI",
                difficulty: "Beginner",
                tags: ['Filesystem'],
                usedIn: ['RHCSA'],
                q: `ما هو FHS وما هي أهم الأدلة فيه؟`,
                a: `Filesystem Hierarchy Standard — الهيكل القياسي لأنظمة الملفات:
/etc — ملفات التهيئة

        // Load progress from localStorage
        function loadStates() {
            const saved = localStorage.getItem('rhcsa_flashcards_progress');
            if (saved) {
                try {
                    cardStates = JSON.parse(saved);
                } catch (e) {
                    cardStates = {};
                }
            }
            // Fill defaults
            flashcardsData.forEach(card => {
                if (!cardStates[card.id]) {
                    cardStates[card.id] = 'unstarted';
                }
            });
            updateStats();
        }

        // Save progress to localStorage
        function saveStates() {
            localStorage.setItem('rhcsa_flashcards_progress', JSON.stringify(cardStates));
            updateStats();
        }

        // Update stats dashboard
        function updateStats() {
            let mastered = 0;
            let review = 0;
            let total = flashcardsData.length;

            flashcardsData.forEach(card => {
                if (cardStates[card.id] === 'mastered') mastered++;
                else if (cardStates[card.id] === 'review') review++;
            });

            document.getElementById('statTotal').innerText = total;
            document.getElementById('statMastered').innerText = mastered;
            document.getElementById('statReview').innerText = review;

            const percentage = Math.round((mastered / total) * 100);
            document.getElementById('statProgress').style.width = percentage + '%';
            document.getElementById('statPercent').innerText = percentage + '%';
        }

        // Reset progress
        window.resetProgress = function() {
            if (confirm("هل أنت متأكد من رغبتك في تصفير تقدمك الدراسي وإلغاء تصنيف كافة البطاقات؟")) {
                cardStates = {};
                flashcardsData.forEach(card => {
                    cardStates[card.id] = 'unstarted';
                });
                saveStates();
                applyFilters();
            }
        }

        // Switch Views
        window.switchView = function(view) {
            currentView = view;
            document.getElementById('btnGridView').classList.toggle('active', view === 'grid');
            document.getElementById('btnFocusView').classList.toggle('active', view === 'focus');

            if (view === 'grid') {
                document.getElementById('cardsGrid').style.display = 'grid';
                document.getElementById('focusView').style.display = 'none';
            } else {
                document.getElementById('cardsGrid').style.display = 'none';
                document.getElementById('focusView').style.display = 'block';
                currentFocusIndex = 0;
                loadFocusCard();
            }
        }

        // Helper to render details block
        function renderDetails(card) {
            return `
                <div class="card-details-container">
                    ${card.example ? `
                    <details class="card-detail" onclick="event.stopPropagation()">
                        <summary>💻 مثال تطبيقي (Practical Example)</summary>
                        <div class="detail-body">
                            <code>${card.example}</code>
                        </div>
                    </details>
                    ` : ''}

                    ${card.mistakes ? `
                    <details class="card-detail" onclick="event.stopPropagation()">
                        <summary>⚠️ أخطاء شائعة (Common Mistakes)</summary>
                        <div class="detail-body">
                            ${card.mistakes}
                        </div>
                    </details>
                    ` : ''}

                    ${card.lab ? `
                    <details class="card-detail" onclick="event.stopPropagation()">
                        <summary>🧪 خطوات اللاب والتجربة (Lab Practice)</summary>
                        <div class="detail-body">
                            ${card.lab}
                        </div>
                    </details>
                    ` : ''}

                    ${card.ref ? `
                    <details class="card-detail" onclick="event.stopPropagation()">
                        <summary>📖 المراجع وصفحات المساعدة (References)</summary>
                        <div class="detail-body">
                            <code>${card.ref}</code>
                        </div>
                    </details>
                    ` : ''}

                    ${card.related && card.related.length > 0 ? `
                    <details class="card-detail" onclick="event.stopPropagation()">
                        <summary>🔗 أوامر وأدوات مرتبطة (Related)</summary>
                        <div class="detail-body">
                            ${card.related.map(r => `<code>${r}</code>`).join(' ')}
                        </div>
                    </details>
                    ` : ''}
                </div>
            `;
        }

        // Render Grid Cards
        function renderGrid() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';

            filteredCards.forEach(card => {
                const stateClass = cardStates[card.id] === 'mastered' ? 'badge-mastered' : (cardStates[card.id] === 'review' ? 'badge-review' : '');
                const stateText = cardStates[card.id] === 'mastered' ? '✅ محفوظ' : (cardStates[card.id] === 'review' ? '🔄 مراجعة' : '🆕 جديد');
                
                const wrapper = document.createElement('div');
                wrapper.className = 'flashcard-wrapper';
                wrapper.id = `card-wrapper-${card.id}`;
                wrapper.onclick = () => toggleGridCard(card.id);

                const tagsHtml = card.tags.map(t => `<span class="badge-tag">${t}</span>`).join(' ');
                const usedInHtml = card.usedIn.map(u => `<span class="badge-usedin">${u}</span>`).join(' ');

                wrapper.innerHTML = `
                    <div class="card-inner" id="card-inner-${card.id}">
                        <!-- Front -->
                        <div class="card-side card-front-side">
                            <div class="card-header">
                                <span class="card-cat">${card.cat}</span>
                                <div class="header-badges">
                                    <span class="badge-difficulty diff-${card.difficulty}">${card.difficulty}</span>
                                    ${usedInHtml}
                                </div>
                            </div>
                            <div class="card-question">Q${card.id}: ${card.q}</div>
                            <div class="card-tags">${tagsHtml}</div>
                            <div class="card-footer-hint">👆 اضغط لمعاينة الإجابة والتفاصيل</div>
                        </div>
                        <!-- Back -->
                        <div class="card-side card-back-side" onclick="event.stopPropagation()">
                            <div class="card-header">
                                <span class="card-cat">${card.cat}</span>
                                <button class="btn-flip-back" onclick="toggleGridCard(${card.id})">↩️ قلب البطاقة</button>
                            </div>
                            
                            <div class="card-answer-section">
                                <span class="card-answer-label">🔑 الإجابة والأمر الأساسي:</span>
                                <div class="card-answer">${card.a}</div>
                            </div>

                            ${renderDetails(card)}

                            <div class="card-actions">
                                <button class="card-action-btn btn-need-review" onclick="setCardState(${card.id}, 'review')">🔄 مراجعة</button>
                                <button class="card-action-btn btn-mastered" onclick="setCardState(${card.id}, 'mastered')">✅ حفظت</button>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(wrapper);
            });

            if (filteredCards.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #8b949e; font-size: 1.2rem;">🔍 لم يتم العثور على بطاقات تطابق فلاتر البحث الحالية.</div>`;
            }
        }

        // Toggle Grid Card Flip
        window.toggleGridCard = function(id) {
            document.getElementById(`card-inner-${id}`).classList.toggle('flipped');
        }

        // Toggle Focus Card Flip
        window.toggleFocusCard = function() {
            document.getElementById('focusCardInner').classList.toggle('flipped');
        }

        // Set Card State (Mastered or Review)
        window.setCardState = function(id, state) {
            cardStates[id] = state;
            saveStates();
            applyFilters();
        }

        // Apply Filters (Search, Category, Difficulty, Tag, State)
        function applyFilters() {
            const catVal = document.getElementById('categoryFilter').value;
            const diffVal = document.getElementById('difficultyFilter').value;
            const tagVal = document.getElementById('tagFilter').value;
            const stateVal = document.getElementById('stateFilter').value;
            const searchVal = document.getElementById('cardSearch').value.trim().toLowerCase();

            filteredCards = flashcardsData.filter(card => {
                // Category match
                const catMatch = (catVal === 'all' || card.cat === catVal);
                
                // Difficulty match
                const diffMatch = (diffVal === 'all' || card.difficulty === diffVal);
                
                // Tag match
                const tagMatch = (tagVal === 'all' || card.tags.includes(tagVal));

                // State match
                const stateMatch = (stateVal === 'all' || 
                                    (stateVal === 'unstarted' && cardStates[card.id] === 'unstarted') ||
                                    (stateVal === 'review' && cardStates[card.id] === 'review') ||
                                    (stateVal === 'mastered' && cardStates[card.id] === 'mastered'));

                // Search match
                const searchMatch = (!searchVal || 
                                     card.q.toLowerCase().includes(searchVal) || 
                                     card.a.toLowerCase().includes(searchVal) || 
                                     card.cat.toLowerCase().includes(searchVal) ||
                                     card.tags.some(t => t.toLowerCase().includes(searchVal)));

                return catMatch && diffMatch && tagMatch && stateMatch && searchMatch;
            });

            if (currentView === 'grid') {
                renderGrid();
            } else {
                currentFocusIndex = 0;
                loadFocusCard();
            }
        }

        // Focus View Navigation & Rendering
        function loadFocusCard() {
            const inner = document.getElementById('focusCardInner');
            inner.classList.remove('flipped');

            setTimeout(() => {
                if (filteredCards.length === 0) {
                    document.getElementById('focusCardQ').innerText = "لم يتم العثور على بطاقات.";
                    document.getElementById('focusCardA').innerText = "";
                    document.getElementById('focusCardCat').innerText = "";
                    document.getElementById('focusCardCatBack').innerText = "";
                    document.getElementById('focusProgressText').innerText = "0 / 0";
                    document.getElementById('focusCardBadgesFront').innerHTML = "";
                    document.getElementById('focusCardTagsFront').innerHTML = "";
                    document.getElementById('focusCardDetails').innerHTML = "";
                    document.getElementById('focusCardActions').innerHTML = "";
                    return;
                }

                const card = filteredCards[currentFocusIndex];
                document.getElementById('focusCardCat').innerText = card.cat;
                document.getElementById('focusCardCatBack').innerText = card.cat;
                document.getElementById('focusCardQ').innerText = `Q${card.id}: ${card.q}`;
                document.getElementById('focusCardA').innerHTML = card.a;
                document.getElementById('focusProgressText').innerText = `${currentFocusIndex + 1} / ${filteredCards.length}`;
                
                // Badges and tags
                const usedInHtml = card.usedIn.map(u => `<span class="badge-usedin">${u}</span>`).join(' ');
                document.getElementById('focusCardBadgesFront').innerHTML = `
                    <span class="badge-difficulty diff-${card.difficulty}">${card.difficulty}</span>
                    ${usedInHtml}
                `;
                document.getElementById('focusCardTagsFront').innerHTML = card.tags.map(t => `<span class="badge-tag">${t}</span>`).join(' ');

                // Details
                document.getElementById('focusCardDetails').innerHTML = renderDetails(card);

                // Set actions
                document.getElementById('focusCardActions').innerHTML = `
                    <button class="card-action-btn btn-need-review" onclick="setCardState(${card.id}, 'review'); nextFocusAfterSelect();">🔄 مراجعة</button>
                    <button class="card-action-btn btn-mastered" onclick="setCardState(${card.id}, 'mastered'); nextFocusAfterSelect();">✅ حفظت</button>
                `;

                // Update navigation buttons status
                document.getElementById('btnFocusPrev').disabled = (currentFocusIndex === 0);
                document.getElementById('btnFocusPrev').style.opacity = (currentFocusIndex === 0) ? 0.5 : 1;
                document.getElementById('btnFocusNext').disabled = (currentFocusIndex === filteredCards.length - 1);
                document.getElementById('btnFocusNext').style.opacity = (currentFocusIndex === filteredCards.length - 1) ? 0.5 : 1;
            }, 150);
        }

        window.navigateFocus = function(dir) {
            const nextIdx = currentFocusIndex + dir;
            if (nextIdx >= 0 && nextIdx < filteredCards.length) {
                currentFocusIndex = nextIdx;
                loadFocusCard();
            }
        }

        window.nextFocusAfterSelect = function() {
            if (currentFocusIndex < filteredCards.length - 1) {
                setTimeout(() => {
                    navigateFocus(1);
                }, 300);
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadStates();
            applyFilters();

            // Event Listeners
            document.getElementById('categoryFilter').addEventListener('change', applyFilters);
            document.getElementById('difficultyFilter').addEventListener('change', applyFilters);
            document.getElementById('tagFilter').addEventListener('change', applyFilters);
            document.getElementById('stateFilter').addEventListener('change', applyFilters);
            document.getElementById('cardSearch').addEventListener('input', applyFilters);
        });
    </script>
    <script src="features.js?v=20"></script>
</body>
</html>
