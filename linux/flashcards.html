<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHCSA (RHEL 9) Flashcards — بطاقات الاستذكار</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <link rel="stylesheet" href="features.css">
    <style>
        body {
            overflow: auto !important;
            height: auto !important;
            display: block !important;
            padding: 0;
            background: radial-gradient(circle at top center, #0b1a30 0%, #030816 100%);
        }
        
        .main-container {
            display: block !important;
            overflow: visible !important;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Stats & Header Panel */
        .dashboard-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .stats-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 25px;
            border-radius: 10px;
            text-align: center;
            min-width: 120px;
        }

        .stat-card .num {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            display: block;
        }

        .stat-card .label {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        /* Progress Circle/Bar */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .progress-bar-outer {
            width: 200px;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #10b981);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-percentage {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--success);
        }

        /* Filter Controls */
        .controls-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .filter-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 280px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 45px 12px 20px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .search-box::after {
            content: "🔍";
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            opacity: 0.6;
        }

        .view-toggle {
            display: flex;
            gap: 10px;
        }

        .view-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #c9d1d9;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.3s;
        }

        .view-btn.active {
            background: var(--accent);
            color: #0d1117;
            border-color: var(--accent);
        }

        /* Card Grid View */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .flashcard-wrapper {
            perspective: 1000px;
            height: 280px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-side {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 22px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .card-front-side {
            background: linear-gradient(145deg, #111b27, #080f19);
            justify-content: space-between;
        }

        .card-back-side {
            background: #0d1624;
            transform: rotateY(180deg);
            overflow-y: auto;
            justify-content: space-between;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        .card-cat {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 700;
            background: var(--accent-glow);
            padding: 2px 8px;
            border-radius: 12px;
        }

        .card-num {
            font-size: 0.85rem;
            color: #8b949e;
        }

        .card-question {
            font-size: 1.15rem;
            line-height: 1.6;
            color: #f0f6fc;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 700;
        }

        .card-answer {
            font-size: 1rem;
            line-height: 1.6;
            color: #c9d1d9;
            flex-grow: 1;
            padding-bottom: 10px;
        }

        .card-answer code {
            font-family: 'Fira Code', monospace;
            background: rgba(0,0,0,0.3);
            color: #58a6ff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .card-answer ul {
            margin-right: 20px;
            margin-top: 5px;
        }

        .card-footer-hint {
            text-align: center;
            font-size: 0.75rem;
            color: #8b949e;
            animation: pulse-light 2s infinite;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 10px;
            margin-top: 10px;
        }

        .card-action-btn {
            flex: 1;
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn-need-review {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .btn-need-review:hover {
            background: rgba(245, 158, 11, 0.2);
        }

        .btn-mastered {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .btn-mastered:hover {
            background: rgba(16, 185, 129, 0.2);
        }

        .card-state-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 700;
        }

        .badge-mastered {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .badge-review {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        /* Focus View Layout */
        .focus-view {
            display: none;
            max-width: 650px;
            margin: 0 auto;
        }

        .focus-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            background: var(--panel-bg);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .focus-card-wrapper {
            height: 380px;
        }

        .focus-card-wrapper .card-question {
            font-size: 1.4rem;
        }

        .focus-card-wrapper .card-answer {
            font-size: 1.1rem;
        }

        @keyframes pulse-light {
            0% { opacity: 0.4; }
            50% { opacity: 0.8; }
            100% { opacity: 0.4; }
        }

        /* Reset all elements to display block or none based on active state */
        .hidden-card {
            display: none !important;
        }
    </style>
</head>

        <div class="logo">

        <div class="nav-buttons">

    <div class="main-container">
        <!-- Dashboard Panel -->

            <div class="stats-group">

                    <span class="num" id="statTotal">100</span>
                    <span class="label">إجمالي البطاقات</span>

            <div class="progress-container">

        <!-- Controls Panel -->
        <div class="controls-panel">
            <div class="filter-row">
                <select id="categoryFilter" style="min-width: 250px;">
                    <option value="all">📂 كل الفصول والأقسام</option>
                    <option value="1️⃣ التفاعل مع النظام وCLI">1️⃣ التفاعل مع النظام وCLI</option>
                    <option value="2️⃣ معالجة النصوص وBash Scripting">2️⃣ معالجة النصوص وBash Scripting</option>
                    <option value="3️⃣ الهوية والصلاحيات (DAC)">3️⃣ الهوية والصلاحيات (DAC)</option>
                    <option value="4️⃣ العمليات والخدمات">4️⃣ العمليات والخدمات</option>
                    <option value="5️⃣ البرمجيات والمستودعات">5️⃣ البرمجيات والمستودعات</option>
                    <option value="6️⃣ الشبكات">6️⃣ الشبكات</option>

                    <option value="1️⃣1️⃣ الإقلاع والإصلاح">1️⃣1️⃣ الإقلاع والإصلاح</option>
                    <option value="1️⃣2️⃣ الأتمتة والحاويات">1️⃣2️⃣ الأتمتة والحاويات</option>
                    <option value="🏆 أسئلة سيناريو (Scenario-Based)">🏆 أسئلة سيناريو (Scenario-Based)</option>

                <select id="stateFilter">
                    <option value="all">👁️ عرض كل البطاقات</option>
                    <option value="unstarted">🆕 لم تبدأ بعد</option>
                    <option value="review">🔄 قيد المراجعة</option>
                    <option value="mastered">✅ المحفوظة فقط</option>

                <div class="view-toggle">
                    <button class="view-btn active" id="btnGridView" onclick="switchView('grid')">📱 عرض الشبكة</button>

            <div class="filter-row">

        <!-- Grid View -->
        <div class="cards-grid" id="cardsGrid">
            <!-- Cards injected here -->

        <!-- Focus View -->
        <div class="focus-view" id="focusView">
            <div class="flashcard-wrapper focus-card-wrapper" onclick="toggleFocusCard()">
                <div class="card-inner" id="focusCardInner">
                    <!-- Front -->
                    <div class="card-side card-front-side">
                        <div class="card-header">
                            <span class="card-cat" id="focusCardCat"></span>
                            <span class="card-num" id="focusCardIndex">Card 1 / 100</span>

                    </div>
                    <!-- Back -->
                    <div class="card-side card-back-side" onclick="event.stopPropagation()">
                        <div class="card-header">
                            <span class="card-cat" id="focusCardCatBack"></span>
                            <span class="card-num" id="focusCardIndexBack">Card 1 / 100</span>
                        </div>

            <div class="focus-controls">
                <button class="btn" id="btnFocusPrev" onclick="navigateFocus(-1)">◀ السابق</button>

    <script>
        // Database
        const flashcardsData = [
            {
                id: 1,
                cat: "1️⃣ التفاعل مع النظام وCLI",
                q: `ما هو FHS وما هي أهم الأدلة فيه؟`,
                a: `<strong>Filesystem Hierarchy Standard — الهيكل القياسي لأنظمة الملفات في Linux:</strong><br>يحدد FHS الوظائف والمواقع القياسية لكل مجلد بالنظام لتسهيل الإدارة والتوافق:<br><ul><li><code>/etc</code> — يحتوي على جميع ملفات التكوين والإعدادات الخاصة بنظام التشغيل والتطبيقات (مثل <code>/etc/hosts</code>).</li><li><code>/var</code> — مخصص للبيانات متغيرة الحجم باستمرار أثناء التشغيل (مثل سجلات النظام Logs في <code>/var/log</code> وقواعد البيانات).</li><li><code>/usr</code> — يحتوي على برمجيات ومكتبات المستخدم المشتركة والملفات الثنائية (مثل <code>/usr/bin</code> للأوامر).</li><li><code>/home</code> — يحتوي على المجلدات المنزلية الخاصة بالمستخدمين العاديين لحفظ ملفاتهم الشخصية.</li><li><code>/tmp</code> — مخصص لحفظ الملفات المؤقتة التي يتم حذفها تلقائياً عند إعادة التشغيل أو بشكل دوري.</li><li><code>/boot</code> — يحتوي على الملفات الأساسية اللازمة لإقلاع النظام مثل الكيرنل (Kernel)، وصورة الـ initramfs، وملفات GRUB.</li></ul>`
            },
            {
                id: 2,
                cat: "1️⃣ التفاعل مع النظام وCLI",
                q: `ما الفرق بين man و pinfo؟`,
                a: `<strong>الفرق بين أدوات المساعدة وقراءة التوثيق:</strong><br><ul><li><code>man</code> (Manual Pages): الأداة القياسية والتقليدية لعرض توثيق الأوامر. تعرض صفحة المساعدة كنص خطي ثابت، ويتم التنقل فيها باستخدام أزرار الأسهم، والبحث داخلها باستخدام الرمز <code>/</code>.</li><li><code>pinfo</code> (Info Pages): قارئ توثيق تفاعلي متطور يعرض صفحات Info بشكل روابط تشعبية (Links) تشبه الويب. يتيح لك الانتقال السريع بين الأقسام بالنقر على مفتاح Enter، ويتميز بالترميز اللوني لتسهيل تتبع شروحات البرامج الكبيرة (مثل أدوات GNU).</li></ul>`
            },
            {
                id: 3,
                cat: "1️⃣ التفاعل مع النظام وCLI",
                q: `ما هي RHEL Lightspeed؟`,
                a: `<strong>مساعد الذكاء الاصطناعي التوليدي من Red Hat:</strong><br>هي خدمة ذكاء اصطناعي توليدي مدمجة في نظام Red Hat Enterprise Linux (RHEL). تساعد مدراء الأنظمة ومهندسي العمليات (DevOps) في:<br><ul><li>كتابة وإعداد سكريبتات الأتمتة (Ansible Playbooks) بشكل آمن ومتوافق.</li><li>تقديم حلول فورية وإرشادات لتشخيص وحل المشاكل التقنية وحوادث النظام بناءً على سياق المشكلة.</li><li>تبسيط إدارة السيرفرات باستخدام الأوامر باللغة الطبيعية.</li></ul>`
            },
            {
                id: 4,
                cat: "1️⃣ التفاعل مع النظام وCLI",
                q: `كيف تنشئ هيكل مجلدات معقد بأمر واحد؟`,
                a: `<strong>باستخدام ميزة التوسع بالأقواس (Brace Expansion) مع خيار التكرار:</strong><br>نقوم بدمج الأداة <code>mkdir</code> مع خيار <code>-p</code> لتوليد المسارات الفرعية تلقائياً:<br><code>mkdir -p /project/{docs,src,tests}/{2024,2025}</code><br><strong>شرح الأجزاء:</strong><br><ul><li><code>-p</code> (Parent): ينشئ المجلد الأب لو لم يكن موجوداً دون إظهار أخطاء.</li><li><code>{docs,src,tests}</code>: ينشئ 3 مجلدات فرعية في نفس المستوى.</li><li><code>{2024,2025}</code>: ينشئ مجلدين فرعيين متداخلين داخل كل مجلد من الثلاثة، مما ينتج عنه 6 مجلدات نهائية فورياً.</li></ul>`
            },
            {
                id: 5,
                cat: "2️⃣ معالجة النصوص وBash Scripting",
                q: `ما هي الثلاثة مسارات افتراضية للبيانات في Linux؟`,
                a: `<strong>قنوات الإدخال والإخراج القياسية (Standard I/O Streams):</strong><br>تتعامل جميع الأوامر والعمليات في لينكس مع ثلاث قنوات تواصل أساسية:<br><ul><li><strong>STDIN (0):</strong> الإدخال القياسي. هو مسار البيانات المتدفقة إلى الأمر (افتراضياً من لوحة المفاتيح).</li><li><strong>STDOUT (1):</strong> الإخراج القياسي. مسار خروج مخرجات الأمر الناجحة (افتراضياً إلى شاشة الطرفية).</li><li><strong>STDERR (2):</strong> الأخطاء القياسية. مسار خروج رسائل الخطأ والفشل بشكل منفصل لتسهيل تشخيصها (افتراضياً إلى شاشة الطرفية).</li></ul>`
            },
            {
                id: 6,
                cat: "2️⃣ معالجة النصوص وBash Scripting",
                q: `ما الفرق بين > و >>؟`,
                a: `<strong>إعادة توجيه المخرجات (Output Redirection):</strong><br><ul><li><code>&gt;</code> (Overwrite): يوجه مخرجات الأمر (stdout) إلى ملف معين ويقوم <strong>بمسح كافة المحتويات السابقة</strong> للملف والكتابة فوقها من جديد.</li><li><code>&gt;&gt;</code> (Append): يوجه المخرجات إلى نهاية الملف و<strong>يلحقها بالبيانات السابقة</strong> دون المساس بها أو حذف أي شيء منها.</li></ul>مثال: <code>echo 'test' &gt; file.txt</code> (تصفير وكتابة)، بينما <code>echo 'test' &gt;&gt; file.txt</code> (إضافة للآخر).`
            },
            {
                id: 7,

        // State Manager

        let cardStates = {}; // id -> 'mastered' or 'review' or 'unstarted'

        // Load progress from localStorage
        function loadStates() {
            const saved = localStorage.getItem('rhcsa_flashcards_progress');
            if (saved) {
                try {
                    cardStates = JSON.parse(saved);
                } catch (e) {
                    cardStates = {};
                }
            }
            // Fill defaults
            flashcardsData.forEach(card => {
                if (!cardStates[card.id]) {
                    cardStates[card.id] = 'unstarted';
                }
            });
            updateStats();
        }

        // Save progress to localStorage
        function saveStates() {
            localStorage.setItem('rhcsa_flashcards_progress', JSON.stringify(cardStates));
            updateStats();
        }

        // Update stats dashboard
        function updateStats() {
            let mastered = 0;
            let review = 0;
            let total = flashcardsData.length;

            flashcardsData.forEach(card => {
                if (cardStates[card.id] === 'mastered') mastered++;
                else if (cardStates[card.id] === 'review') review++;
            });

            document.getElementById('statTotal').innerText = total;
            document.getElementById('statMastered').innerText = mastered;
            document.getElementById('statReview').innerText = review;

            const percentage = Math.round((mastered / total) * 100);
            document.getElementById('statProgress').style.width = percentage + '%';
            document.getElementById('statPercent').innerText = percentage + '%';
        }

        // Reset progress
        window.resetProgress = function() {
            if (confirm("هل أنت متأكد من رغبتك في تصفير تقدمك الدراسي وإلغاء تصنيف كافة البطاقات؟")) {
                cardStates = {};
                flashcardsData.forEach(card => {
                    cardStates[card.id] = 'unstarted';
                });
                saveStates();
                applyFilters();
            }
        }

        // Switch Views
        window.switchView = function(view) {
            currentView = view;
            document.getElementById('btnGridView').classList.toggle('active', view === 'grid');
            document.getElementById('btnFocusView').classList.toggle('active', view === 'focus');

            if (view === 'grid') {
                document.getElementById('cardsGrid').style.display = 'grid';
                document.getElementById('focusView').style.display = 'none';
            } else {
                document.getElementById('cardsGrid').style.display = 'none';
                document.getElementById('focusView').style.display = 'block';
                currentFocusIndex = 0;
                loadFocusCard();
            }
        }

        function renderGrid() {

                const wrapper = document.createElement('div');
                wrapper.className = 'flashcard-wrapper';
                wrapper.id = `card-wrapper-${card.id}`;
                wrapper.onclick = () => toggleGridCard(card.id);

                wrapper.innerHTML = `
                    <div class="card-inner" id="card-inner-${card.id}">

                        <div class="card-side card-front-side">

                                <span class="card-cat">${card.cat}</span>
                                <span class="card-state-badge ${stateClass}">${stateText}</span>
                            </div>
                            <div class="card-question">Q${card.id}: ${card.q}</div>

                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(wrapper);
            });

            if (filteredCards.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #8b949e; font-size: 1.2rem;">🔍 لم يتم العثور على بطاقات تطابق فلاتر البحث الحالية.</div>`;
            }
        }

        // Toggle Grid Card Flip
        window.toggleGridCard = function(id) {
            document.getElementById(`card-inner-${id}`).classList.toggle('flipped');
        }

        // Toggle Focus Card Flip
        window.toggleFocusCard = function() {
            document.getElementById('focusCardInner').classList.toggle('flipped');
        }

        // Set Card State (Mastered or Review)
        window.setCardState = function(id, state) {
            cardStates[id] = state;
            saveStates();
            // Optional: immediately update status display in the card if in grid view
            applyFilters();
        }

        // Apply Filters (Search, Category, State)
        function applyFilters() {
            const catVal = document.getElementById('categoryFilter').value;
            const stateVal = document.getElementById('stateFilter').value;
            const searchVal = document.getElementById('cardSearch').value.trim().toLowerCase();

            filteredCards = flashcardsData.filter(card => {
                // Category match
                const catMatch = (catVal === 'all' || card.cat === catVal);
                
                // State match
                const stateMatch = (stateVal === 'all' || 
                                    (stateVal === 'unstarted' && cardStates[card.id] === 'unstarted') ||
                                    (stateVal === 'review' && cardStates[card.id] === 'review') ||
                                    (stateVal === 'mastered' && cardStates[card.id] === 'mastered'));

                // Search match
                const searchMatch = (!searchVal || 
                                     card.q.toLowerCase().includes(searchVal) || 
                                     card.a.toLowerCase().includes(searchVal) || 
                                     card.cat.toLowerCase().includes(searchVal));

                return catMatch && stateMatch && searchMatch;
            });

            if (currentView === 'grid') {
                renderGrid();
            } else {
                currentFocusIndex = 0;
                loadFocusCard();
            }
        }

        // Focus View Navigation & Rendering
        function loadFocusCard() {
            const inner = document.getElementById('focusCardInner');
            inner.classList.remove('flipped');

            setTimeout(() => {
                if (filteredCards.length === 0) {
                    document.getElementById('focusCardQ').innerText = "لم يتم العثور على بطاقات.";
                    document.getElementById('focusCardA').innerText = "";
                    document.getElementById('focusCardCat').innerText = "";
                    document.getElementById('focusCardCatBack').innerText = "";
                    document.getElementById('focusProgressText').innerText = "0 / 0";
                    document.getElementById('focusCardIndex').innerText = "";
                    document.getElementById('focusCardIndexBack').innerText = "";
                    document.getElementById('focusCardActions').innerHTML = "";
                    return;
                }

                const card = filteredCards[currentFocusIndex];
                document.getElementById('focusCardCat').innerText = card.cat;
                document.getElementById('focusCardCatBack').innerText = card.cat;
                document.getElementById('focusCardQ').innerText = `Q${card.id}: ${card.q}`;
                document.getElementById('focusCardA').innerHTML = card.a;
                document.getElementById('focusProgressText').innerText = `${currentFocusIndex + 1} / ${filteredCards.length}`;
                
                document.getElementById('focusCardIndex').innerText = `بطاقة ${currentFocusIndex + 1} / ${filteredCards.length}`;
                document.getElementById('focusCardIndexBack').innerText = `بطاقة ${currentFocusIndex + 1} / ${filteredCards.length}`;

                // Set actions
                document.getElementById('focusCardActions').innerHTML = `
                    <button class="card-action-btn btn-need-review" onclick="setCardState(${card.id}, 'review'); nextFocusAfterSelect();">🔄 مراجعة</button>
                    <button class="card-action-btn btn-mastered" onclick="setCardState(${card.id}, 'mastered'); nextFocusAfterSelect();">✅ حفظت</button>
                `;

                // Update navigation buttons status
                document.getElementById('btnFocusPrev').disabled = (currentFocusIndex === 0);
                document.getElementById('btnFocusPrev').style.opacity = (currentFocusIndex === 0) ? 0.5 : 1;
                document.getElementById('btnFocusNext').disabled = (currentFocusIndex === filteredCards.length - 1);
                document.getElementById('btnFocusNext').style.opacity = (currentFocusIndex === filteredCards.length - 1) ? 0.5 : 1;
            }, 150);
        }

        window.navigateFocus = function(dir) {
            const nextIdx = currentFocusIndex + dir;
            if (nextIdx >= 0 && nextIdx < filteredCards.length) {
                currentFocusIndex = nextIdx;
                loadFocusCard();
            }
        }

        window.nextFocusAfterSelect = function() {
            if (currentFocusIndex < filteredCards.length - 1) {
                setTimeout(() => {
                    navigateFocus(1);
                }, 300);
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadStates();
            applyFilters();

            // Event Listeners
            document.getElementById('categoryFilter').addEventListener('change', applyFilters);
            document.getElementById('stateFilter').addEventListener('change', applyFilters);
            document.getElementById('cardSearch').addEventListener('input', applyFilters);
        });
    </script>
    <script src="features.js?v=20"></script>
</body>
</html>
