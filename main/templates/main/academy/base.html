<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% block meta_desc %}Bug Bounty Academy — Arabic & English cybersecurity learning{% endblock %}">
  <title>{% block title %}Academy{% endblock %} | Abdo Ramdan</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&family=Noto+Kufi+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% block css_path %}/static/main/css/academy.css{% endblock %}">
  {% block extra_head %}{% endblock %}
</head>
<body class="academy-page">

<header class="academy-header">
  <div class="academy-logo">🎯 Bug Bounty Academy</div>
  <nav class="academy-nav-links">
    <a class="academy-btn" href="{% block home_link %}index.html{% endblock %}">← Home / الرئيسية</a>
    <a class="academy-btn" href="{% block methodology_link %}methodology.html{% endblock %}" target="_blank">🗺️ Methodology</a>
    <a class="academy-btn" href="{% block writeups_link %}bug-bounty-writeups.html{% endblock %}">📝 Writeups</a>
  </nav>
</header>

<div class="academy-layout">
  <aside class="academy-sidebar">
    <div class="sidebar-title">Vulnerabilities / الثغرات</div>
    <a class="sidebar-link {% block nav_sqli %}{% endblock %}" href="{% block sqli_link %}../vulnerabilities/sql-injection.html{% endblock %}">💉 SQL Injection</a>
    <a class="sidebar-link {% block nav_idor %}{% endblock %}" href="{% block idor_link %}../vulnerabilities/idor.html{% endblock %}">🔓 IDOR / BAC</a>
    <a class="sidebar-link {% block nav_ssrf %}{% endblock %}" href="{% block ssrf_link %}../vulnerabilities/ssrf.html{% endblock %}">🌐 SSRF</a>
    <div class="sidebar-title" style="margin-top:18px;">Labs / المختبرات</div>
    <a class="sidebar-link {% block nav_sqli_lab %}{% endblock %}" href="{% block sqli_lab_link %}../labs/sql-injection-lab.html{% endblock %}">🧪 SQLi Lab</a>
    <a class="sidebar-link" href="{% block home_labs_link %}index.html{% endblock %}">🐚 Linux Terminal</a>
  </aside>

  <main class="academy-main">
    {% block content %}{% endblock %}
  </main>
</div>

<script>
  function copyCmd(btn) {
    var pre = btn.closest('.cmd-block').querySelector('pre');
    if (!pre) return;
    navigator.clipboard.writeText(pre.textContent.trim()).then(function() {
      var o = btn.textContent;
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = o; btn.classList.remove('copied'); }, 2000);
    });
  }
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
