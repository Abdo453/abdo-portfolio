{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HunterOS — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Fira+Code:wght@400;500&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:   #03030a;
      --bg2:  #080814;
      --card: rgba(10,10,28,0.88);
      --bdr:  rgba(0,229,255,0.13);
      --c:    #00e5ff;
      --cg:   rgba(0,229,255,0.22);
      --g:    #00ff66;
      --p:    #ff3366;
      --v:    #9b59ff;
      --tx:   #ccd6f6;
      --mu:   #64748b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--tx);
      font-family: 'Cairo','Outfit',sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* grid bg */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; top: -20%; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 600px;
      background: radial-gradient(ellipse, rgba(0,229,255,.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ── Navbar ── */
    .nav {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      height: 62px; padding: 0 32px;
      background: rgba(3,3,10,.93);
      border-bottom: 1px solid var(--bdr);
      backdrop-filter: blur(14px);
    }
    .nav-logo {
      font-family: 'Fira Code',monospace;
      font-size: 1.05rem; color: var(--c); letter-spacing: 1px;
    }
    .nav-logo b { color: #fff; font-weight: 700; }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-user {
      font-family: 'Fira Code',monospace;
      font-size: .78rem; color: var(--mu);
    }
    .btn-out {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 18px;
      background: rgba(255,51,102,.08);
      border: 1px solid rgba(255,51,102,.35);
      color: var(--p); border-radius: 7px;
      font-family: 'Fira Code',monospace; font-size: .78rem;
      cursor: pointer; text-decoration: none; transition: all .2s;
    }
    .btn-out:hover {
      background: rgba(255,51,102,.18);
      box-shadow: 0 0 14px rgba(255,51,102,.2);
    }

    /* ── Page ── */
    .page {
      position: relative; z-index: 1;
      max-width: 920px; margin: 0 auto;
      padding: 44px 20px 80px;
    }

    /* ── Hero ── */
    .hero {
      background: var(--card);
      border: 1px solid var(--bdr); border-radius: 18px;
      padding: 38px 34px; display: flex; align-items: center; gap: 32px;
      margin-bottom: 22px; position: relative; overflow: hidden;
      backdrop-filter: blur(12px);
    }
    .hero::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg,transparent,var(--c),var(--v),transparent);
    }

    .av-wrap { position: relative; flex-shrink: 0; }
    .av-ring {
      width: 112px; height: 112px; border-radius: 50%; padding: 3px;
      background: linear-gradient(135deg,var(--c),var(--v));
      box-shadow: 0 0 32px var(--cg);
    }
    .av-img {
      width: 100%; height: 100%;
      border-radius: 50%; object-fit: cover;
      background: var(--bg2); display: block;
    }
    .av-dot {
      position: absolute; bottom: 6px; right: 6px;
      width: 15px; height: 15px; border-radius: 50%;
      background: var(--g); border: 2px solid var(--bg);
      box-shadow: 0 0 10px var(--g); animation: pdot 2s infinite;
    }
    @keyframes pdot {
      0%,100% { box-shadow: 0 0 8px var(--g); }
      50%      { box-shadow: 0 0 18px var(--g); }
    }

    .hi { flex: 1; }
    .hi-name {
      font-family: 'Outfit',sans-serif;
      font-size: 2rem; font-weight: 800; color: #fff; margin-bottom: 4px;
    }
    .hi-role {
      font-family: 'Fira Code',monospace;
      font-size: .78rem; color: var(--c); margin-bottom: 16px;
    }
    .hi-meta { display: flex; flex-wrap: wrap; gap: 16px; }
    .mi { display: flex; align-items: center; gap: 7px; font-size: .82rem; color: var(--mu); }
    .mi span { color: var(--tx); }
    .xp-pill {
      display: inline-flex; align-items: center; gap: 7px;
      margin-top: 16px; padding: 7px 18px;
      background: linear-gradient(135deg,rgba(0,229,255,.1),rgba(155,89,255,.1));
      border: 1px solid rgba(0,229,255,.28); border-radius: 999px;
      font-family: 'Fira Code',monospace; font-size: .88rem;
      color: var(--c); font-weight: 600;
    }

    /* ── Stats ── */
    .sg {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 16px; margin-bottom: 22px;
    }
    .sc {
      background: var(--card); border: 1px solid var(--bdr);
      border-radius: 13px; padding: 24px 16px; text-align: center;
      backdrop-filter: blur(10px); transition: all .28s; position: relative; overflow: hidden;
    }
    .sc:hover { transform: translateY(-4px); box-shadow: 0 10px 32px rgba(0,229,255,.08); border-color: var(--c); }
    .sc::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: var(--accent,var(--c)); transform: scaleX(0); transition: transform .3s;
    }
    .sc:hover::after { transform: scaleX(1); }
    .sc-ic { font-size: 1.9rem; margin-bottom: 8px; }
    .sc-val {
      font-family: 'Outfit',sans-serif;
      font-size: 2.3rem; font-weight: 800; color: var(--accent,var(--c));
      line-height: 1; margin-bottom: 5px;
    }
    .sc-lbl { font-size: .73rem; color: var(--mu); font-family: 'Fira Code',monospace; }

    /* ── XP Bar ── */
    .xp-card {
      background: var(--card); border: 1px solid var(--bdr);
      border-radius: 13px; padding: 24px 28px;
      margin-bottom: 22px; backdrop-filter: blur(10px);
    }
    .xp-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .xp-lbl { font-family: 'Fira Code',monospace; font-size: .83rem; color: var(--c); }
    .xp-num { font-size: .8rem; color: var(--mu); }
    .xp-track {
      height: 9px; background: rgba(255,255,255,.06);
      border-radius: 5px; overflow: hidden; margin-bottom: 9px;
    }
    .xp-bar {
      height: 100%;
      background: linear-gradient(90deg,var(--c),var(--v));
      border-radius: 5px; width: 0%;
      transition: width 1.2s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 12px var(--cg);
    }
    .xp-bot {
      display: flex; justify-content: space-between;
      font-size: .73rem; color: var(--mu);
      font-family: 'Fira Code',monospace;
    }

    /* ── Section title ── */
    .stitle {
      font-family: 'Outfit',sans-serif; font-size: 1.05rem;
      font-weight: 700; color: #fff; margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .stitle::after { content: ''; flex: 1; height: 1px; background: var(--bdr); }

    /* ── Badges ── */
    .bg-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(128px,1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .bc {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 11px; padding: 18px 10px;
      text-align: center; transition: all .3s;
      opacity: .38; filter: grayscale(1);
    }
    .bc.on {
      opacity: 1; filter: none; border-color: var(--c);
      box-shadow: 0 0 18px rgba(0,229,255,.1);
      animation: bpop .4s ease;
    }
    @keyframes bpop {
      0%  { transform: scale(.82); }
      60% { transform: scale(1.09); }
      100%{ transform: scale(1); }
    }
    .bc.on:hover { transform: translateY(-4px); }
    .be { font-size: 2rem; display: block; margin-bottom: 6px; }
    .bn { font-size: .69rem; color: var(--tx); font-weight: 600; margin-bottom: 2px; }
    .bs { font-size: .64rem; color: var(--mu); font-family: 'Fira Code',monospace; }
    .bc.on .bs { color: var(--g); }

    /* ── Activity ── */
    .ac-card {
      background: var(--card); border: 1px solid var(--bdr);
      border-radius: 13px; padding: 24px 28px;
      margin-bottom: 24px; backdrop-filter: blur(10px);
    }
    .ai {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .ai:last-child { border-bottom: none; }
    .ad { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .at { flex: 1; font-size: .82rem; color: var(--tx); }
    .ax { font-family: 'Fira Code',monospace; font-size: .77rem; color: var(--g); }
    .empty {
      text-align: center; padding: 32px; color: var(--mu); font-size: .84rem;
    }
    .empty .em { font-size: 2rem; display: block; margin-bottom: 8px; opacity: .3; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .hero { flex-direction: column; text-align: center; padding: 28px 18px; }
      .hi-meta { justify-content: center; }
      .sg { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="nav">
  <div class="nav-logo">&lt;/<b>HunterOS</b>&gt;</div>
  <div class="nav-right">
    <span class="nav-user" id="nav-un">...</span>
    <a class="btn-out" href="#" id="logout-btn">&#9211; خروج</a>
  </div>
</nav>

<div class="page">

  <!-- Hero -->
  <div class="hero">
    <div class="av-wrap">
      <div class="av-ring">
        <img class="av-img" id="av" src="" alt="avatar">
      </div>
      <div class="av-dot"></div>
    </div>
    <div class="hi">
      <div class="hi-name" id="uname">&#9472;&#9472;&#9472;</div>
      <div class="hi-role">// Security Researcher &amp; Hacker</div>
      <div class="hi-meta">
        <div class="mi">&#128231; <span id="uemail">N/A</span></div>
        <div class="mi">&#128241; <span id="uwa">N/A</span></div>
        <div class="mi">&#129489; <span id="ugender">N/A</span></div>
      </div>
      <div class="xp-pill">&#9889; <span id="uxp">0</span> XP</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="sg">
    <div class="sc" style="--accent:#00e5ff">
      <div class="sc-ic">&#127937;</div>
      <div class="sc-val" id="sflags">0</div>
      <div class="sc-lbl">Flags / 31</div>
    </div>
    <div class="sc" style="--accent:#00ff66">
      <div class="sc-ic">&#129514;</div>
      <div class="sc-val" id="slabs">0</div>
      <div class="sc-lbl">Labs / 11</div>
    </div>
    <div class="sc" style="--accent:#9b59ff">
      <div class="sc-ic">&#127919;</div>
      <div class="sc-val" id="spct">0%</div>
      <div class="sc-lbl">&#1575;&#1604;&#1573;&#1606;&#1580;&#1575;&#1586; &#1575;&#1604;&#1603;&#1604;&#1610;</div>
    </div>
  </div>

  <!-- XP Bar -->
  <div class="xp-card">
    <div class="xp-top">
      <span class="xp-lbl">&#9889; &#1605;&#1587;&#1578;&#1608;&#1609; &#1575;&#1604;&#1582;&#1576;&#1585;&#1577;</span>
      <span class="xp-num" id="xpnum">0 / 1000 XP</span>
    </div>
    <div class="xp-track"><div class="xp-bar" id="xpbar"></div></div>
    <div class="xp-bot">
      <span id="xplvl">Beginner</span>
      <span id="xpnxt">&#8594; Junior Hacker @ 1000 XP</span>
    </div>
  </div>

  <!-- Badges -->
  <div class="stitle">&#127885; &#1575;&#1604;&#1588;&#1575;&#1585;&#1575;&#1578; &#1608;&#1575;&#1604;&#1573;&#1606;&#1580;&#1575;&#1586;&#1575;&#1578;</div>
  <div class="bg-grid" id="bgrid"></div>

  <!-- Activity -->
  <div class="stitle">&#128203; &#1570;&#1582;&#1585; &#1575;&#1604;&#1606;&#1588;&#1575;&#1591;&#1575;&#1578;</div>
  <div class="ac-card">
    <div id="alist">
      <div class="empty">
        <span class="em">&#128377;</span>
        &#1604;&#1605; &#1578;&#1581;&#1604; &#1575;&#1610; &#1578;&#1581;&#1583;&#1610; &#1576;&#1593;&#1583;!
      </div>
    </div>
  </div>

</div><!-- /page -->

<script>
(function() {
  "use strict";

  var BADGES = [
    { k:"sqli",   e:"&#128737;", n:"SQLi Master",   s:"sqli_lab_flags",    t:3 },
    { k:"cmd",    e:"&#128026;", n:"RCE Hacker",     s:"cmd_inj_flags",     t:3 },
    { k:"jwt",    e:"&#127903;", n:"JWT Expert",     s:"jwt_lab_flags",     t:3 },
    { k:"idor",   e:"&#128275;", n:"BAC Auditor",    s:"idor_lab_flags",    t:3 },
    { k:"ssrf",   e:"&#127758;", n:"SSRF Expert",    s:"ssrf_lab_flags",    t:3 },
    { k:"graphql",e:"&#128752;", n:"GQL Auditor",    s:"graphql_lab_flags", t:2 },
    { k:"race",   e:"&#9201;",   n:"Race Expert",    s:"race_lab_flags",    t:2 },
    { k:"api",    e:"&#128273;", n:"API Sec",        s:"api_lab_flags",     t:3 },
    { k:"ai",     e:"&#129302;", n:"AI Sec",         s:"ai_lab_flags",      t:2 },
    { k:"cloud",  e:"&#9729;",   n:"Cloud Sec",      s:"cloud_lab_flags",   t:2 },
    { k:"linux",  e:"&#128039;", n:"Linux Admin",    s:"linux_lab_flags",   t:5 }
  ];

  var LEVELS = [
    { mn:0,    mx:999,  lbl:"Beginner",           nx:"Junior Hacker",    nxp:1000  },
    { mn:1000, mx:2499, lbl:"Junior Hacker",      nx:"Pentester",        nxp:2500  },
    { mn:2500, mx:4999, lbl:"Penetration Tester", nx:"Security Analyst", nxp:5000  },
    { mn:5000, mx:9999, lbl:"Security Analyst",   nx:"Elite Hacker",     nxp:10000 },
    { mn:10000,mx:1e9,  lbl:"Elite Hacker",       nx:"MAX LEVEL",        nxp:1e9   }
  ];

  function lv(xp) {
    return LEVELS.find(function(l){ return xp >= l.mn && xp <= l.mx; }) || LEVELS[0];
  }
  function s(id, v) {
    var el = document.getElementById(id);
    if (el) el.textContent = v;
  }

  function renderBadges(done) {
    var g = document.getElementById("bgrid");
    g.innerHTML = "";
    BADGES.forEach(function(b) {
      var ok = done.indexOf(b.k) !== -1;
      var d = document.createElement("div");
      d.className = "bc" + (ok ? " on" : "");
      d.innerHTML =
        "<span class='be'>" + b.e + "</span>" +
        "<div class='bn'>" + b.n + "</div>" +
        "<div class='bs'>" + (ok ? "&#10004; Unlocked" : "Locked") + "</div>";
      g.appendChild(d);
    });
  }

  function calcStats() {
    var flags = 0, labs = 0, done = [], act = [];
    BADGES.forEach(function(b) {
      try {
        var raw = localStorage.getItem(b.s);
        var obj = raw ? JSON.parse(raw) : {};
        var sl  = Object.keys(obj).filter(function(k){ return obj[k]; });
        flags  += sl.length;
        if (sl.length >= b.t) { labs++; done.push(b.k); }
        sl.forEach(function(fk) {
          act.push({ t: "Flag: " + fk.replace(/_/g," ") + " — " + b.n, xp: "+20 XP", c:"#00ff66" });
        });
      } catch(e) {}
    });
    return { flags:flags, labs:labs, pct:Math.round(flags/31*100), done:done, act:act };
  }

  function renderActivity(items) {
    var el = document.getElementById("alist");
    if (!items.length) {
      el.innerHTML = "<div class='empty'><span class='em'>&#128377;</span>&#1604;&#1605; &#1578;&#1581;&#1604; &#1575;&#1610; &#1578;&#1581;&#1583;&#1610; &#1576;&#1593;&#1583;!</div>";
      return;
    }
    el.innerHTML = items.slice(-8).reverse().map(function(a) {
      return "<div class='ai'>" +
        "<div class='ad' style='background:" + a.c + "'></div>" +
        "<div class='at'>" + a.t + "</div>" +
        "<div class='ax'>" + a.xp + "</div></div>";
    }).join("");
  }

  function apply(u) {
    var xp = parseInt(u.xp) || parseInt(localStorage.getItem("arena_xp") || "0") || 0;

    s("nav-un", u.username);
    s("uname",  u.username);
    s("uemail", u.email    || "N/A");
    s("uwa",    u.whatsapp || "N/A");
    s("ugender",u.gender === "female" ? "&#1571;&#1606;&#1579;&#1609;" : "&#1584;&#1603;&#1585;");
    s("uxp",    xp.toLocaleString());

    var aEl = document.getElementById("av");
    var bg  = u.gender === "female" ? "ff3366" : "00e5ff";
    var fg  = u.gender === "female" ? "fff"    : "030308";
    aEl.src = u.avatar
      || ("https://ui-avatars.com/api/?name=" + encodeURIComponent(u.username) +
          "&background=" + bg + "&color=" + fg + "&size=200&bold=true");
    aEl.onerror = function() {
      this.src = "https://ui-avatars.com/api/?name=H&background=1a1a2e&color=00e5ff&size=200";
    };

    var lvl  = lv(xp);
    var fill = lvl.mx >= 1e9 ? 100 :
               Math.min(100, Math.round((xp - lvl.mn) / (lvl.mx - lvl.mn + 1) * 100));

    s("xpnum", xp.toLocaleString() + " / " + (lvl.mx >= 1e9 ? "MAX" : lvl.mx.toLocaleString()) + " XP");
    s("xplvl", lvl.lbl);
    s("xpnxt", lvl.mx >= 1e9 ? "MAX LEVEL" : "-> " + lvl.nx + " @ " + lvl.nxp.toLocaleString() + " XP");
    setTimeout(function() {
      var bar = document.getElementById("xpbar");
      if (bar) bar.style.width = fill + "%";
    }, 250);

    var st = calcStats();
    s("sflags", st.flags);
    s("slabs",  st.labs);
    s("spct",   st.pct + "%");
    renderBadges(st.done);
    renderActivity(st.act);
  }

  async function load() {
    try {
      var res  = await fetch("/api/auth/profile");
      var data = await res.json();
      if (!data.authenticated) { window.location.href = "/login"; return; }
      localStorage.setItem("current_user", JSON.stringify(data.user));
      apply(data.user);
    } catch(err) {
      var raw = localStorage.getItem("current_user");
      if (raw) { try { apply(JSON.parse(raw)); } catch(e) {} }
    }
  }

  document.getElementById("logout-btn").addEventListener("click", async function(e) {
    e.preventDefault();
    try { await fetch("/api/auth/logout", { method:"POST" }); } catch(ex) {}
    localStorage.removeItem("current_user");
    window.location.href = "/login";
  });

  load();
})();
</script>
</body>
</html>
